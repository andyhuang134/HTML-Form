<!DOCTYPE html>
<html>
  <head style="font-family: 'Courier New', Courier, monospace;">
    <center><b>Alex Tran</b></center>
  </head>

  <body style="font-family: 'Courier New', Courier, monospace">
    <center>
      <form>
      
        <label for="name">Enter your name: </label>
        <input type="text" id="name" name="name">
        <br>

        <label for="phone number">Your Phone number: </label>
        <input type="text" id="phone" name="phone">
        <br>
        <br>


        <p>What would you like?</p>
        <input type="checkbox" id="pepsi" name="pepsi">
        <label for="pepsi">Pepsi</label>
        <br>

        <input type="checkbox" id="coke" name="coke">
        <label for="coke">Coke</label>
        <br>
        
        <input type="checkbox" id="fries" name="fries">
        <label for="fries">Fries</label>
        <br>
        <br>


        <p>What gender are you?</p>
        <input type="radio" id="female" name="gender">
        <label for="female">Female</label>
        
        <input type="radio" id="male" name="gender">
        <label for="male">Male</label>
        
        <input type="radio" id="other" name="gender">
        <label for="other">Other</label>
        <br>
        <br>  

        <button type="button">Submit</button>

    </form>
  </center>
  </body>
</html>
